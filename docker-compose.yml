services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai-novel-backend
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-local}
      DATABASE_URL: postgresql+asyncpg://novelflow:novelflow@postgres:5432/novelflow
      REDIS_URL: redis://redis:6379/0
      TEMPORAL_HOST: temporal:7233
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      MODEL_GATEWAY_PROVIDER: ${MODEL_GATEWAY_PROVIDER:-openai}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-gpt-5.5}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com/v1}
      MODEL_GATEWAY_TIMEOUT_SECONDS: ${MODEL_GATEWAY_TIMEOUT_SECONDS:-300}
      JWT_SECRET: ${JWT_SECRET:-please-change-me-in-production-min-32-chars}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_TTL_MINUTES: ${ACCESS_TOKEN_TTL_MINUTES:-15}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-7}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:13000,http://127.0.0.1:13000}
      REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME:-novelflow_refresh}
      REFRESH_COOKIE_SECURE: ${REFRESH_COOKIE_SECURE:-false}
      REFRESH_COOKIE_SAMESITE: ${REFRESH_COOKIE_SAMESITE:-lax}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ai-novel-frontend
    environment:
      NEXT_PUBLIC_API_BASE: /api/v1
      INTERNAL_API_BASE: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-13000}:3000"
    depends_on:
      backend:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-novel-postgres
    environment:
      POSTGRES_USER: novelflow
      POSTGRES_PASSWORD: novelflow
      POSTGRES_DB: novelflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novelflow -d novelflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-novel-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal-postgres:
    image: postgres:16-alpine
    container_name: ai-novel-temporal-postgres
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal_postgres_data:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.25.1
    container_name: ai-novel-temporal
    depends_on:
      - temporal-postgres
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/docker.yaml
    ports:
      - "${TEMPORAL_PORT:-7233}:7233"

  temporal-ui:
    image: temporalio/ui:2.30.1
    container_name: ai-novel-temporal-ui
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:${FRONTEND_PORT:-13000}
    ports:
      - "8080:8080"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: ai-novel-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: novelflow
      MINIO_ROOT_PASSWORD: novelflow123
    ports:
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  temporal_postgres_data:
  minio_data:

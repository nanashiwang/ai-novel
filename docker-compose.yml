services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-novel-postgres
    environment:
      POSTGRES_USER: novelflow
      POSTGRES_PASSWORD: novelflow
      POSTGRES_DB: novelflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novelflow -d novelflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-novel-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal-postgres:
    image: postgres:16-alpine
    container_name: ai-novel-temporal-postgres
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    ports:
      - "5433:5432"
    volumes:
      - temporal_postgres_data:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.25.1
    container_name: ai-novel-temporal
    depends_on:
      - temporal-postgres
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.30.1
    container_name: ai-novel-temporal-ui
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: ai-novel-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: novelflow
      MINIO_ROOT_PASSWORD: novelflow123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  temporal_postgres_data:
  minio_data:

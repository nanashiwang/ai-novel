# Prometheus 主配置（Sprint 13-A4）。
#
# - 仅本地/单机部署使用；生产环境通常由托管服务（Cloud Native Prom / Thanos）覆盖
# - scrape backend `/metrics` 端点；backend 自身的 prometheus_client 已注册指标
# - alertmanager 不必需，本地 file_sd 即可
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: ai-novel-local
    environment: local

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # 本地未部署 alertmanager；告警通过 Prometheus UI 即可观察

scrape_configs:
  - job_name: ai-novel-backend
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - backend:8000
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: ai-novel-backend

  - job_name: prometheus-self
    static_configs:
      - targets: [localhost:9090]

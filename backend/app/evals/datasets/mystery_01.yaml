id: mystery_01
genre: 悬疑
language: zh
notes: |
  悬疑样本：刑警搭档夜访案发现场，节奏紧凑、信息量密集。
bible_summary: |
  《雾港旧案》：港口连环失踪案表面平静，实则与十年前的航运公司倒闭旧案
  有关。沈砚是市局重案组组长，以冷静严苛著称；副手江昼则擅长侧写。世界
  设定为现实向，无超自然元素；唯一硬规则：所有失踪者最后一次出现都在
  6 号仓库附近。
chapter_plan:
  title: 6 号仓库
  scenes_count: 5
  arc: 沈砚与江昼第一次实地进入 6 号仓库，发现关键物证
  hook: 仓库门内侧划痕的方向与失踪者从外向内逃跑的假设相反
scene_plan:
  scene_index: 3
  scene_title: 门内的划痕
  location: 雾港 6 号仓库主门厅，凌晨两点
  time_marker: 雨夜，海风从西南吹来
  characters: [沈砚, 江昼]
  goal: 沈砚想找到证明失踪者曾被关押的物证
  conflict: 物证指向的方向与已有口供矛盾
  emotion_start: 克制
  emotion_end: 警觉
  reveal: 划痕显示有人从仓库**内部**用力刮门
  hook: 江昼提出"也许失踪者一开始就在仓库里，从来没有从外面进来"
target_words: 600
reference_content: |
  雨没停。沈砚把手电压得很低，光圈贴着地面往前走。江昼在他左后侧半步，
  鞋底踩过一摊水，没出声。

  门厅里有股潮气和铁锈味。

  "口供说，三个人是从这扇门跑进来的。"江昼说。

  "嗯。"沈砚没抬头。他的光圈停在门板内侧。

  那是几道横着的、深浅不一的划痕，每一道末端都有一个向上挑起的弧。划痕
  从距地面三十公分开始，一直延伸到将近一米五。

  "看方向。"沈砚的声音压得更低。

  江昼蹲下，眯起眼。三秒后他抬起头。

  "是从里向外刮的。"

  "嗯。"

  雨声里夹着一声远处的汽笛。沈砚没动，光圈在门板上停了很久。他知道江昼
  在等他说话，而他自己在等脑子里那点不对劲翻上来。

  口供是三个码头工人给的，说见过三个人慌慌张张从外面跑进 6 号仓库，再
  没出来。可门内侧的划痕证明，有人是在**里面**朝外挠门。挠到一米五���—
  那不是慌乱的几下，而是有意识地、长时间地，想出去。

  "组长。"江昼站起来，"如果失踪者一开始就在仓库里——"

  沈砚抬眼。

  "那作证的三个码头工人，"江昼说，"是在帮谁圆口供？"

  风从西南灌进来，门轴吱呀响了一声。沈砚关掉手电。

  "明天，先查这三个人的航运公司履历。"

  ��往门外走，雨水落在肩上。江昼跟上去，回头又看了一眼那扇门。

  门内侧的划痕在黑暗里看不见了，但他记住了那个向上挑起的弧度——像一个
  人，反复地，写同一个字。

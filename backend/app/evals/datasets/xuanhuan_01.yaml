id: xuanhuan_01
genre: 玄幻
language: zh
notes: |
  玄幻样本：御灵宗少年内门弟子直面师门血案，画面感与世界规则压力并行。
bible_summary: |
  《九霄御灵录》：人类与灵兽共修，灵兽与人通过契印共享神识；契印一旦破碎，
  双方都会遭受神魂反噬。御灵宗位居九霄第一峰，弟子林澈在内门排名前十，与
  雪狼幼崽"霜枭"立下血誓契约。世界硬规则：契主不得伤害契兽；契约破碎需以
  契主一缕魂魄为代价。
chapter_plan:
  title: 雪原契约
  scenes_count: 4
  arc: 内门考核失败后，林澈被卷入雪原灵兽暴动事件
  hook: 林澈发现契兽霜枭背上多了一道不属于他的契印
scene_plan:
  scene_index: 2
  scene_title: 契印异变
  location: 雪原边境的废弃御灵堂
  time_marker: 黄昏，第一场雪刚停
  characters: [林澈, 霜枭, 神秘黑袍人]
  goal: 林澈想确认霜枭背上的第二道契印来源
  conflict: 黑袍人逼林澈在自断契约和被反噬之间做选择
  emotion_start: 警觉
  emotion_end: 决绝
  reveal: 第二道契印来自御灵宗内门长老
  hook: 林澈选择用魂魄碎片去封住第二道契印
target_words: 600
reference_content: |
  风停了，雪原边缘的废弃御灵堂只剩半截屋脊。林澈推门进去，鞋底踩在结冰的
  石阶上，发出一声脆响。

  "霜枭，过来。"他压低声音。

  雪狼幼崽从神龛后探出半个头，背上的银毛在残阳里翻起一层金红。���澈伸手，
  指尖蹭过那道熟悉的蓝色契印——以及它旁边，新出现的一道暗红印纹。

  *不属于我的。*

  他的呼吸短了半拍。

  "聪明。"

  低沉的笑声从屋脊塌陷处压下来。一道黑袍身影背着光，缓步落在堂中。来人
  抬手，露出指节上一枚暗红契牌。

  "你的雪狼，从血誓那天起就不止一个主人。"黑袍人说，"现在我给你一个机会。
  自断契约，霜枭归我；不断——"他指尖轻弹，霜枭背上的暗红印纹立刻浮起一层
  血丝，"你和它一起被反噬到神魂俱裂。"

  林澈没有立刻回答。他蹲下，把霜枭按进自己怀里。幼狼的体温烫得不正常。

  *是长老的味道。*

  那道熟悉的灵气他闻过无数次——内门授课时，那位最德高望重的长老身上就是
  这股冷而苦的雪松香。

  "你是他派来的。"林澈抬眼。

  "我是来收一笔旧账。"黑袍人没否认。

  风又起了。林澈把手按在霜枭的契印上，指腹下传来微弱的脉动，像两颗心脏
  在抢同一根血管。

  他笑了一下，很轻。

  "那就让他亲自来收。"

  下一刻，他咬破指尖，一缕魂魄碎片随血光涌入契印之中。

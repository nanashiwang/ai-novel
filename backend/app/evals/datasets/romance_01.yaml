id: romance_01
genre: 言情
language: zh
notes: |
  言情样本：分手三年后的咖啡馆重逢，对话比重高，情绪克制。
bible_summary: |
  《再见亦是初见》：苏怀玦与陆时砚大学时是恋人，毕业前因家庭原因分手。
  三年后苏怀玦回国，与陆时砚在前老板的婚礼上重逢。世界为现实向当代都市，
  无超自然设定。情感主线：彼此都未走出，却都不愿先低头。
chapter_plan:
  title: 第三杯美式

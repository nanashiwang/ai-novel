target_words: 500
reference_content: |
  咖啡馆靠窗的位置。

  阳光从苏怀玦左肩斜进来，落在桌沿。她已经坐了二十分钟，面前是第三杯
  美式。

  陆时砚推门进来的时候，她没回头。

  "好久不见。"他走到对面，西装外套挂在椅背，一动作她就闻到了。还是那
  种木质香调。

  "嗯。"她应了一声，端起杯子。

  服务员过来续水。陆时砚顺手点了杯黑咖啡，无糖。苏怀玦的指尖在杯沿停了
  一下。

  "你回国多久了？"

  "三个月。"

  "工作还顺利？"

  "嗯，挺好。"

  这种对话她在飞机上预演过无数遍，每一句都干净、礼貌，不留任何缝隙。

  陆时砚没接话。他的视线落在桌面上的三个杯子上——两个空的，一个还在冒
  热气。

  "你今天，"他说，"喝得有点多。"

  "嗯。"

  "美式？"

  "嗯。"

  他没再问。

  阳光又移了一寸，落到了那只还冒热气的杯子上。苏怀玦低头，看自己的手。
  三年前的那个夜里，她也是这样，连喝三杯美式，因为他说过——*哭的时候不
  能喝甜的，会更难过。*

  "你还记得吗？"她听见自��问。

  陆时砚没抬头。

  停顿。

  然后他伸手，把那只还冒热气的杯子，轻轻地，往她面前推了半寸。

  "我说过，"他声音很低，"第三杯，已经够了。"

  苏怀玦的睫毛颤了一下。她端起杯子，喝了一口。

  烫，但她没松手。
